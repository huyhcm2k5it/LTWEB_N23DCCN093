<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài tập thực hành buổi 6</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="header-container">
        <h1>Buổi 06 — Bài tập thực hành</h1>
        <p>Node.js + Express · Middleware · Routing · Fetch API</p>
    </div>

    <div class="container">
        <!-- FORM 1 -->
        <div class="form-card">
            <h2>FORM 1 — KIỂM TRA THÔNG TIN</h2>
            <form id="form1">
                <div class="form-group">
                    <label for="name1">Tên</label>
                    <input type="text" id="name1" placeholder="Nhập tên..." required>
                </div>
                <div class="form-group">
                    <label for="age1">Tuổi</label>
                    <input type="number" id="age1" placeholder="Nhập tuổi..." required>
                </div>
                <button type="submit">Gửi GET /api/info</button>
            </form>
            <div class="result-box" id="result1">Kết quả sẽ hiện ở đây...</div>
        </div>

        <!-- FORM 2 -->
        <div class="form-card">
            <h2>FORM 2 — ĐĂNG KÝ NGƯỜI DÙNG</h2>
            <form id="form2">
                <div class="form-group">
                    <label for="name2">Tên</label>
                    <input type="text" id="name2" placeholder="Nhập tên..." required>
                </div>
                <div class="form-group">
                    <label for="age2">Tuổi</label>
                    <input type="number" id="age2" placeholder="Nhập tuổi..." required>
                </div>
                <div class="form-group">
                    <label for="email2">Email</label>
                    <input type="email" id="email2" placeholder="Nhập email..." required>
                </div>
                <button type="submit">Gửi POST /api/register</button>
            </form>
            <div class="result-box" id="result2">Kết quả sẽ hiện ở đây...</div>
        </div>
    </div>

    <script>
        // FORM 1 (GET)
        document.getElementById('form1').addEventListener('submit', function(event) {
            event.preventDefault();
            
            const name = document.getElementById('name1').value;
            const age = document.getElementById('age1').value;
            
            fetch(`/api/info?name=${encodeURIComponent(name)}&age=${encodeURIComponent(age)}`)
                .then(res => res.json())
                .then(data => {
                    const resultBox = document.getElementById('result1');
                    resultBox.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
                    if (data.error) {
                        resultBox.style.color = '#dc3545';
                    } else {
                        resultBox.style.color = '#333';
                    }
                })
                .catch(err => {
                    document.getElementById('result1').innerText = "Lỗi kết nối!";
                });
        });

        // FORM 2 (POST)
        document.getElementById('form2').addEventListener('submit', function(event) {
            event.preventDefault();
            
            const name = document.getElementById('name2').value;
            const age = document.getElementById('age2').value;
            const email = document.getElementById('email2').value;
            
            fetch('/api/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ name, age, email })
            })
            .then(res => res.json())
            .then(data => {
                const resultBox = document.getElementById('result2');
                resultBox.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
                if (data.error) {
                    resultBox.style.color = '#dc3545';
                } else {
                    resultBox.style.color = '#333';
                }
            })
            .catch(err => {
                document.getElementById('result2').innerText = "Lỗi kết nối!";
            });
        });
    </script>
</body>
</html>
